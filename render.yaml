services:
  - type: web
    name: ccp-backend
    runtime: python
    buildCommand: cd frontend && npm install && npm run build && cp -r dist ../backend/static
    startCommand: cd backend && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DASHSCOPE_API_KEY
        sync: false
      - key: DASHSCOPE_BASE_URL
        value: "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"
      - key: FRONTEND_URL
        sync: false
      - key: PYTHON_VERSION
        value: "3.11"
